version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.test
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  backend:
    build: .
    command: ["bash", "-lc", "./scripts/wait-for-it.sh db 5432 && python manage.py migrate && gunicorn core.wsgi:application --bind 0.0.0.0:8000"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/app_db
      DEBUG: "True"
      SECRET_KEY: change-me
      ALLOWED_HOSTS: ["*"]
      CORS_ALLOWED_ORIGINS: ["http://localhost:3000"]
      CSRF_TRUSTED_ORIGINS: ["http://localhost:3000"]
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db

volumes:
  db_data: